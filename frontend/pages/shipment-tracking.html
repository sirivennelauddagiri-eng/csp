<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>" />
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>My Orders & Shipment Tracking | CleanCity</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: { "display": ["Public Sans"] },
                    animation: {
                        "slide-up": "slideUp 0.5s ease-out",
                        "fade-in": "fadeIn 0.4s ease-out",
                    },
                    keyframes: {
                        slideUp: { "0%": { opacity: 0, transform: "translateY(20px)" }, "100%": { opacity: 1, transform: "translateY(0)" } },
                        fadeIn: { "0%": { opacity: 0 }, "100%": { opacity: 1 } },
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .status-step { transition: all 0.5s ease; }
        .status-step.active .dot { background-color: #13ec5b; box-shadow: 0 0 0 4px rgba(19,236,91,0.25); }
        .status-step.done .dot { background-color: #13ec5b; }
        .status-step.pending .dot { background-color: #e5e7eb; }
        .tracking-bar { position: relative; }
        .tracking-bar::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            height: 3px;
            background: #e5e7eb;
            border-radius: 99px;
            z-index: 0;
        }
        .tracking-bar .progress-fill {
            position: absolute;
            top: 12px;
            left: 12px;
            height: 3px;
            background: #13ec5b;
            border-radius: 99px;
            z-index: 0;
            transition: width 1s ease;
        }
    </style>
    <script type="module" src="../components/header.js"></script>

  <meta name="author" content="Anirudh Kumar" />
  <meta name="project" content="CivicImpact" />
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen">
<div class="flex flex-col min-h-screen">
    <div id="app-header"></div>

    <main class="flex-1 px-4 py-8 lg:px-16 xl:px-32 max-w-screen-xl mx-auto w-full">

        <!-- Header Row -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8 animate-slide-up">
            <div class="flex items-center gap-3">
                <a href="rewards.html" class="p-2 rounded-xl hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                    <span class="material-symbols-outlined text-gray-500">arrow_back</span>
                </a>
                <div>
                    <h1 class="text-2xl font-black text-gray-900 dark:text-white">My Orders</h1>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Track all your eco-reward shipments</p>
                </div>
            </div>
            <!-- Quick Track by Number -->
            <div class="flex gap-2">
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-gray-400 text-lg">track_changes</span>
                    <input id="quickTrackInput" type="text" placeholder="Enter tracking number..."
                        class="pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-sm font-medium w-56 focus:outline-none focus:ring-2 focus:ring-primary dark:text-white" />
                </div>
                <button onclick="quickTrack()" class="px-4 py-2.5 bg-primary text-background-dark rounded-xl font-bold text-sm hover:brightness-110 transition-all flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">search</span> Track
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-20 animate-fade-in">
            <span class="material-symbols-outlined text-primary text-5xl animate-spin mb-4">autorenew</span>
            <p class="text-gray-500 font-medium">Loading your shipments...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-center animate-fade-in">
            <div class="w-24 h-24 bg-primary/10 rounded-full flex items-center justify-center mb-4">
                <span class="material-symbols-outlined text-primary text-5xl">package_2</span>
            </div>
            <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2">No orders yet</h3>
            <p class="text-gray-500 dark:text-gray-400 mb-6">Redeem your eco-points for amazing rewards!</p>
            <a href="rewards.html" class="px-6 py-3 bg-primary text-background-dark rounded-xl font-bold text-sm hover:brightness-110 transition-all inline-flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">redeem</span> Browse Rewards
            </a>
        </div>

        <!-- Orders List -->
        <div id="ordersList" class="hidden space-y-5"></div>
    </main>
</div>

<!-- Shipment Detail Modal -->
<div id="detailModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden flex items-start justify-center p-4 pt-16 overflow-y-auto">
    <div id="detailContent" class="bg-white dark:bg-gray-900 w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden animate-slide-up"></div>
</div>

<script type="module">
import { API_BASE } from '../js/apiConfig.js';

const STATUS_STEPS = ["Order Placed", "Processing", "Packed", "Shipped", "Out for Delivery", "Delivered"];

const STATUS_COLORS = {
    "Order Placed":      { bg: "bg-blue-100 dark:bg-blue-900/30",   text: "text-blue-600 dark:text-blue-400",   icon: "receipt_long" },
    "Processing":        { bg: "bg-yellow-100 dark:bg-yellow-900/30", text: "text-yellow-600 dark:text-yellow-400", icon: "settings" },
    "Packed":            { bg: "bg-purple-100 dark:bg-purple-900/30", text: "text-purple-600 dark:text-purple-400", icon: "inventory_2" },
    "Shipped":           { bg: "bg-indigo-100 dark:bg-indigo-900/30", text: "text-indigo-600 dark:text-indigo-400", icon: "local_shipping" },
    "Out for Delivery":  { bg: "bg-orange-100 dark:bg-orange-900/30", text: "text-orange-600 dark:text-orange-400", icon: "delivery_dining" },
    "Delivered":         { bg: "bg-green-100 dark:bg-green-900/30",   text: "text-green-600 dark:text-green-400",   icon: "check_circle" },
    "Cancelled":         { bg: "bg-red-100 dark:bg-red-900/30",       text: "text-red-600 dark:text-red-400",       icon: "cancel" }
};

async function loadShipments() {
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = '../auth/login.html'; return; }

    try {
        const res = await fetch(`${API_BASE}/api/shipments/my`, {
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        document.getElementById('loadingState').classList.add('hidden');

        if (!data.success || !data.shipments || data.shipments.length === 0) {
            document.getElementById('emptyState').classList.remove('hidden');
            return;
        }

        document.getElementById('ordersList').classList.remove('hidden');
        renderOrders(data.shipments);
    } catch (e) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
    }
}

function renderOrders(shipments) {
    const container = document.getElementById('ordersList');
    container.innerHTML = shipments.map(s => {
        const sc = STATUS_COLORS[s.status] || STATUS_COLORS["Order Placed"];
        const date = new Date(s.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        const estDate = new Date(s.estimatedDelivery).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
        const stepIdx = STATUS_STEPS.indexOf(s.status);
        const progress = s.status === 'Cancelled' ? 0 : Math.max(5, Math.round(((stepIdx + 1) / STATUS_STEPS.length) * 100));

        return `
        <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden animate-slide-up cursor-pointer hover:shadow-md hover:border-primary/30 transition-all" onclick="openDetail('${s._id}')">
            <div class="p-5">
                <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3 mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-xl ${sc.bg} flex items-center justify-center flex-shrink-0">
                            <span class="material-symbols-outlined ${sc.text}">${sc.icon}</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-gray-900 dark:text-white text-sm">${s.rewardTitle}</h3>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Ordered ${date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 sm:flex-col sm:items-end">
                        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold ${sc.bg} ${sc.text}">
                            <span class="material-symbols-outlined text-[12px]">${sc.icon}</span>
                            ${s.status}
                        </span>
                        <span class="text-xs text-gray-500 dark:text-gray-400 font-medium">${s.pointsSpent.toLocaleString()} pts</span>
                    </div>
                </div>

                <!-- Progress Bar -->
                ${s.status !== 'Cancelled' ? `
                <div class="mb-4">
                    <div class="flex justify-between text-[10px] font-bold text-gray-400 mb-2">
                        <span>Order Placed</span><span>In Transit</span><span>Delivered</span>
                    </div>
                    <div class="relative h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                        <div class="absolute top-0 left-0 h-full bg-gradient-to-r from-primary to-green-400 rounded-full transition-all duration-1000" style="width:${progress}%"></div>
                    </div>
                </div>` : ''}

                <!-- Info Row -->
                <div class="flex flex-wrap gap-4 text-xs text-gray-500 dark:text-gray-400">
                    <span class="flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px] text-primary">tag</span>
                        <span class="font-mono font-bold tracking-wide">${s.trackingNumber}</span>
                    </span>
                    <span class="flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">person</span> ${s.recipientName}
                    </span>
                    <span class="flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">location_on</span> ${s.city}, ${s.state}
                    </span>
                    ${s.status !== 'Delivered' && s.status !== 'Cancelled' ? `
                    <span class="flex items-center gap-1 ml-auto text-primary font-bold">
                        <span class="material-symbols-outlined text-[14px]">event</span> Est. ${estDate}
                    </span>` : ''}
                </div>
            </div>
            <div class="px-5 py-3 bg-gray-50 dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700 flex justify-between items-center">
                <span class="text-xs text-gray-500">Click to see full tracking details</span>
                <span class="material-symbols-outlined text-gray-400 text-sm">chevron_right</span>
            </div>
        </div>`;
    }).join('');
}

window.openDetail = async function(id) {
    const token = localStorage.getItem('token');
    const res = await fetch(`${API_BASE}/api/shipments/${id}`, {
        headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) return;
    const s = data.shipment;

    const sc = STATUS_COLORS[s.status] || STATUS_COLORS["Order Placed"];
    const orderDate = new Date(s.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
    const estDate = new Date(s.estimatedDelivery).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });

    const historyHTML = (s.trackingHistory || []).map(h => {
        const t = new Date(h.timestamp).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        return `
        <div class="flex gap-3">
            <div class="flex flex-col items-center">
                <div class="w-3 h-3 rounded-full bg-primary flex-shrink-0 mt-1"></div>
                <div class="w-0.5 bg-gray-200 dark:bg-gray-700 flex-1 mt-1"></div>
            </div>
            <div class="pb-4">
                <p class="text-sm font-bold text-gray-900 dark:text-white">${h.status}</p>
                <p class="text-xs text-gray-500">${h.message}</p>
                <p class="text-[10px] text-gray-400 mt-0.5">${t}</p>
            </div>
        </div>`;
    }).join('');

    document.getElementById('detailContent').innerHTML = `
    <div class="p-6 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 ${sc.bg} rounded-xl flex items-center justify-center">
                <span class="material-symbols-outlined ${sc.text}">${sc.icon}</span>
            </div>
            <div>
                <h2 class="font-black text-gray-900 dark:text-white">${s.rewardTitle}</h2>
                <p class="text-xs text-gray-500">Order Date: ${orderDate}</p>
            </div>
        </div>
        <button onclick="document.getElementById('detailModal').classList.add('hidden')" class="text-gray-400 hover:text-red-500 transition-colors p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700">
            <span class="material-symbols-outlined">close</span>
        </button>
    </div>
    <div class="p-6 space-y-6">
        <!-- Tracking Number -->
        <div class="bg-gradient-to-r from-primary/10 to-green-50 dark:from-primary/5 dark:to-green-900/10 rounded-2xl p-4 flex items-center justify-between">
            <div>
                <p class="text-xs text-gray-500 uppercase font-bold tracking-widest mb-1">Tracking Number</p>
                <p class="text-2xl font-black text-primary tracking-widest">${s.trackingNumber}</p>
            </div>
            <div class="text-right">
                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-bold ${sc.bg} ${sc.text}">
                    <span class="material-symbols-outlined text-sm">${sc.icon}</span> ${s.status}
                </span>
                <p class="text-xs text-gray-500 mt-1">Est. Delivery: ${estDate}</p>
            </div>
        </div>

        <!-- Delivery Address -->
        <div>
            <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Delivery Address</p>
            <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-4 space-y-1 text-sm">
                <p class="font-bold text-gray-900 dark:text-white">${s.recipientName}</p>
                <p class="text-gray-600 dark:text-gray-400">${s.phone}</p>
                <p class="text-gray-600 dark:text-gray-400">${s.addressLine1}${s.addressLine2 ? ', ' + s.addressLine2 : ''}</p>
                <p class="text-gray-600 dark:text-gray-400">${s.city}, ${s.state} - ${s.postalCode}</p>
                <p class="text-gray-600 dark:text-gray-400">${s.country}</p>
            </div>
        </div>

        <!-- Tracking History -->
        <div>
            <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3">Tracking History</p>
            ${s.trackingHistory && s.trackingHistory.length > 0 ? historyHTML : `
            <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-4 text-center text-sm text-gray-500">
                <span class="material-symbols-outlined text-gray-400 text-3xl mb-2 block">history</span>
                No tracking updates yet.
            </div>`}
        </div>

        <!-- Order Meta -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-3">
                <p class="text-xs font-bold text-gray-500 uppercase">Points Spent</p>
                <p class="text-lg font-black text-primary">${s.pointsSpent.toLocaleString()} pts</p>
            </div>
            <div class="bg-gray-50 dark:bg-gray-800 rounded-xl p-3">
                <p class="text-xs font-bold text-gray-500 uppercase">Reward Type</p>
                <p class="text-lg font-black text-gray-900 dark:text-white">${s.rewardType}</p>
            </div>
        </div>
    </div>`;

    document.getElementById('detailModal').classList.remove('hidden');
};

window.quickTrack = async function() {
    const num = document.getElementById('quickTrackInput').value.trim();
    if (!num) return;
    const token = localStorage.getItem('token');
    const res = await fetch(`${API_BASE}/api/shipments/track/${num}`, {
        headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    if (!data.success) { alert('❌ Tracking number not found.'); return; }
    openDetail(data.shipment._id);
};

// Close modal on overlay click
document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
});

loadShipments();
</script>

  <footer style="text-align: center; padding: 15px; font-size: 13px; color: #666; background-color: #f8f9fa; border-top: 1px solid #eaeaea; width: 100%; position: relative; z-index: 50;">
    &copy; 2025 CivicImpact | Developed by Anirudh Kumar | All Rights Reserved
  </footer>
</body>
</html>
